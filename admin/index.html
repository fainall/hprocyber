<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>hprocyber — Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f5f7; --surface: #ffffff; --border: #e2e5ea;
    --text: #1a1d23; --muted: #6b7280; --accent: #2563eb;
    --accent-soft: #eff6ff; --danger: #dc2626; --success: #16a34a;
    --sidebar-w: 220px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* ---- Login ---- */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #0f1117;
  }
  .login-box {
    background: #1a1d27; border: 1px solid #2a2d3a;
    border-radius: 12px; padding: 48px 40px; width: 360px;
  }
  .login-logo { font-size: 22px; font-weight: 700; color: #fff;
    letter-spacing: -0.02em; margin-bottom: 8px; }
  .login-sub { font-size: 12px; color: #6b7280; margin-bottom: 32px;
    letter-spacing: 0.05em; text-transform: uppercase; }
  .login-box label { display: block; font-size: 11px; color: #9ca3af;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; margin-top: 18px; }
  .login-box input {
    width: 100%; padding: 10px 14px; background: #0f1117;
    border: 1px solid #2a2d3a; border-radius: 6px; color: #fff;
    font-size: 14px; outline: none; transition: border-color .2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-btn {
    margin-top: 28px; width: 100%; padding: 11px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 6px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity .2s;
  }
  .login-btn:hover { opacity: .9; }
  .login-error { margin-top: 14px; color: #f87171; font-size: 12px; text-align: center; }

  /* ---- App Shell ---- */
  #app { display: none; min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w); background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto;
  }
  .sidebar-header {
    padding: 20px 16px 16px; border-bottom: 1px solid var(--border);
  }
  .sidebar-brand { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .sidebar-label { font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.1em; margin-top: 2px; }
  .sidebar-nav { flex: 1; padding: 12px 8px; }
  .sidebar-group-label {
    font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.1em; padding: 12px 8px 4px; font-weight: 600;
  }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 6px; cursor: pointer;
    color: var(--muted); font-size: 13px; font-weight: 500;
    transition: background .15s, color .15s; margin-bottom: 1px;
  }
  .nav-item:hover { background: var(--bg); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); }
  .nav-item .icon { font-size: 15px; width: 18px; text-align: center; }
  .sidebar-footer {
    padding: 12px 8px; border-top: 1px solid var(--border);
  }
  .logout-btn {
    width: 100%; padding: 8px 10px; background: none; border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted); font-size: 12px; cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* Main content */
  .main {
    margin-left: var(--sidebar-w); flex: 1;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 32px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 10;
  }
  .topbar-title { font-size: 16px; font-weight: 600; }
  .lang-tabs { display: flex; gap: 4px; }
  .lang-tab {
    padding: 5px 14px; border-radius: 5px; border: 1px solid var(--border);
    background: none; font-size: 12px; font-weight: 600; cursor: pointer;
    color: var(--muted); transition: all .15s;
  }
  .lang-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .content-area { padding: 32px; flex: 1; max-width: 820px; }

  /* Section Panel */
  .section-panel { display: none; }
  .section-panel.active { display: block; }

  /* Field groups */
  .field-group {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 20px; overflow: hidden;
  }
  .field-group-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    background: #fafafa;
  }
  .field-group-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; }
  .field input, .field textarea, .field select {
    padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; color: var(--text); background: var(--bg);
    outline: none; transition: border-color .2s; font-family: inherit;
    width: 100%;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
  .field textarea { resize: vertical; min-height: 80px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* Array items */
  .array-item {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 10px;
  }
  .array-item-label {
    font-size: 11px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px;
  }

  /* Save bar */
  .save-bar {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 16px 32px; display: flex; align-items: center;
    justify-content: space-between; gap: 16px;
    position: sticky; bottom: 0;
  }
  .save-status { font-size: 12px; color: var(--muted); }
  .save-status.ok { color: var(--success); font-weight: 600; }
  .save-status.err { color: var(--danger); font-weight: 600; }
  .save-btn {
    padding: 10px 28px; background: var(--accent); color: #fff;
    border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity .2s;
  }
  .save-btn:hover { opacity: .9; }
  .save-btn:disabled { opacity: .5; cursor: not-allowed; }
  .preview-link {
    font-size: 12px; color: var(--accent); text-decoration: none;
  }
  .preview-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">hprocyber</div>
    <div class="login-sub">Panel de Administración</div>
    <label>Usuario</label>
    <input type="text" id="login-user" placeholder="admin" autocomplete="username" />
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
    <button class="login-btn" id="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="shell">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">hprocyber</div>
        <div class="sidebar-label">Panel Admin</div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-group-label">Secciones</div>
        <div class="nav-item active" onclick="showSection('hero')" id="nav-hero">
          <span class="icon">🏠</span> Hero
        </div>
        <div class="nav-item" onclick="showSection('problem')" id="nav-problem">
          <span class="icon">⚠️</span> El Problema
        </div>
        <div class="nav-item" onclick="showSection('value')" id="nav-value">
          <span class="icon">💎</span> Propuesta de Valor
        </div>
        <div class="nav-item" onclick="showSection('services')" id="nav-services">
          <span class="icon">🛡️</span> Servicios
        </div>
        <div class="nav-item" onclick="showSection('advisor')" id="nav-advisor">
          <span class="icon">🎯</span> Servicios Advisor
        </div>
        <div class="nav-item" onclick="showSection('method')" id="nav-method">
          <span class="icon">⚙️</span> Metodología
        </div>
        <div class="nav-item" onclick="showSection('diff')" id="nav-diff">
          <span class="icon">✨</span> Diferenciadores
        </div>
        <div class="nav-item" onclick="showSection('about')" id="nav-about">
          <span class="icon">👥</span> Quiénes Somos
        </div>
        <div class="nav-item" onclick="showSection('plans')" id="nav-plans">
          <span class="icon">📋</span> Planes
        </div>
        <div class="nav-item" onclick="showSection('cta')" id="nav-cta">
          <span class="icon">📬</span> Contacto
        </div>
        <div class="nav-item" onclick="showSection('foot')" id="nav-foot">
          <span class="icon">🦶</span> Footer
        </div>
      </nav>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="doLogout()">Cerrar sesión</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="topbar">
        <div class="topbar-title" id="topbar-title">Hero</div>
        <div class="lang-tabs">
          <button class="lang-tab active" id="tab-es" onclick="setLang('es')">Español</button>
          <button class="lang-tab" id="tab-en" onclick="setLang('en')">English</button>
        </div>
      </div>

      <div class="content-area" id="content-area">
        <!-- Sections rendered by JS -->
      </div>

      <div class="save-bar">
        <div>
          <a class="preview-link" href="../" target="_blank">↗ Ver sitio</a>
        </div>
        <div style="display:flex;align-items:center;gap:16px">
          <span class="save-status" id="save-status"></span>
          <button class="save-btn" id="save-btn" onclick="saveContent()">Guardar cambios</button>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
const API = '../api/';
let content = {};
let lang = 'es';
let currentSection = 'hero';

const SECTION_LABELS = {
  hero: 'Hero', problem: 'El Problema', value: 'Propuesta de Valor',
  services: 'Servicios', advisor: 'Servicios Advisor', method: 'Metodología',
  diff: 'Diferenciadores', about: 'Quiénes Somos', plans: 'Planes',
  cta: 'Contacto', foot: 'Footer'
};

// ---- Auth ----
async function doLogin() {
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Ingresando...';
  const username = document.getElementById('login-user').value;
  const password = document.getElementById('login-pass').value;
  try {
    const r = await fetch(API + 'auth.php?action=login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (d.ok) { await loadContent(); showApp(); }
    else { showLoginError(d.error || 'Error al ingresar'); }
  } catch { showLoginError('Error de conexión'); }
  btn.disabled = false; btn.textContent = 'Ingresar';
}

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function showLoginError(msg) {
  document.getElementById('login-error').textContent = msg;
}

async function doLogout() {
  await fetch(API + 'auth.php?action=logout');
  location.reload();
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderSection(currentSection);
}

// ---- Content loading ----
async function loadContent() {
  const r = await fetch(API + 'content.php');
  const d = await r.json();
  content = (d && Object.keys(d).length > 0) ? d : getDefaultContent();
}

async function saveContent() {
  collectFormValues();
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true; btn.textContent = 'Guardando...';
  status.textContent = ''; status.className = 'save-status';
  try {
    const r = await fetch(API + 'content.php', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(content)
    });
    const d = await r.json();
    if (d.ok) { status.textContent = '✓ Guardado correctamente'; status.className = 'save-status ok'; }
    else { status.textContent = '✗ Error al guardar'; status.className = 'save-status err'; }
  } catch { status.textContent = '✗ Error de conexión'; status.className = 'save-status err'; }
  btn.disabled = false; btn.textContent = 'Guardar cambios';
  setTimeout(() => { status.textContent = ''; status.className = 'save-status'; }, 4000);
}

// ---- Lang ----
function setLang(l) {
  lang = l;
  document.getElementById('tab-es').className = 'lang-tab' + (l === 'es' ? ' active' : '');
  document.getElementById('tab-en').className = 'lang-tab' + (l === 'en' ? ' active' : '');
  renderSection(currentSection);
}

// ---- Navigation ----
function showSection(section) {
  collectFormValues();
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + section).classList.add('active');
  document.getElementById('topbar-title').textContent = SECTION_LABELS[section];
  currentSection = section;
  renderSection(section);
}

// ---- Helpers ----
function field(key, label, value, type = 'input') {
  const el = type === 'textarea'
    ? `<textarea data-key="${key}" rows="3">${esc(value)}</textarea>`
    : `<input type="text" data-key="${key}" value="${esc(value)}" />`;
  return `<div class="field"><label>${label}</label>${el}</div>`;
}

function esc(v) { return String(v ?? '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function get(path, obj = content[lang]) {
  return path.split('.').reduce((o, k) => o?.[k], obj) ?? '';
}

// ---- Collect form values back into content ----
function collectFormValues() {
  document.querySelectorAll('[data-key]').forEach(el => {
    const keys = el.dataset.key.split('.');
    let obj = content[lang];
    for (let i = 0; i < keys.length - 1; i++) {
      const k = isNaN(keys[i]) ? keys[i] : parseInt(keys[i]);
      obj = obj[k];
    }
    const last = isNaN(keys[keys.length - 1]) ? keys[keys.length - 1] : parseInt(keys[keys.length - 1]);
    obj[last] = el.value;
  });
}

// ---- Render sections ----
function renderSection(section) {
  const area = document.getElementById('content-area');
  const c = content[lang] || {};
  let html = '';

  if (section === 'hero') {
    html = `
      <div class="field-group"><div class="field-group-header">Título y eyebrow</div><div class="field-group-body">
        ${field('hero.eyebrow', 'Eyebrow', get('hero.eyebrow'))}
        <div class="field-row">
          ${field('hero.title_pre', 'Título — antes del énfasis', get('hero.title_pre'))}
          ${field('hero.title_em', 'Énfasis (cursiva)', get('hero.title_em'))}
        </div>
        ${field('hero.title_post', 'Título — después del énfasis', get('hero.title_post'))}
        ${field('hero.desc', 'Descripción', get('hero.desc'), 'textarea')}
      </div></div>
      <div class="field-group"><div class="field-group-header">Botones</div><div class="field-group-body">
        <div class="field-row">
          ${field('hero.cta1', 'CTA Primario', get('hero.cta1'))}
          ${field('hero.cta2', 'CTA Secundario', get('hero.cta2'))}
        </div>
      </div></div>
      <div class="field-group"><div class="field-group-header">Estadísticas</div><div class="field-group-body">
        ${[0,1,2].map(i => `
          <div class="array-item"><div class="array-item-label">Stat ${i+1}</div>
            <div class="field-row">
              ${field('hero.stats.'+i+'.v', 'Valor', get('hero.stats.'+i+'.v'))}
              ${field('hero.stats.'+i+'.l', 'Descripción', get('hero.stats.'+i+'.l'))}
            </div>
          </div>`).join('')}
      </div></div>`;
  }

  else if (section === 'problem') {
    html = `
      <div class="field-group"><div class="field-group-header">Encabezado</div><div class="field-group-body">
        ${field('problem.eyebrow', 'Eyebrow', get('problem.eyebrow'))}
        <div class="field-row">
          ${field('problem.title_pre', 'Título — antes', get('problem.title_pre'))}
          ${field('problem.title_em', 'Énfasis', get('problem.title_em'))}
          ${field('problem.title_post', 'Después', get('problem.title_post'))}
        </div>
        ${field('problem.desc', 'Descripción', get('problem.desc'), 'textarea')}
      </div></div>
      <div class="field-group"><div class="field-group-header">Problemas (4 ítems)</div><div class="field-group-body">
        ${[0,1,2,3].map(i => `
          <div class="array-item"><div class="array-item-label">Problema ${i+1}</div>
            ${field('problem.items.'+i+'.t', 'Título', get('problem.items.'+i+'.t'))}
            ${field('problem.items.'+i+'.d', 'Descripción', get('problem.items.'+i+'.d'), 'textarea')}
          </div>`).join('')}
      </div></div>`;
  }

  else if (section === 'value') {
    html = `
      <div class="field-group"><div class="field-group-header">Encabezado</div><div class="field-group-body">
        ${field('value.eyebrow', 'Eyebrow', get('value.eyebrow'))}
        <div class="field-row">
          ${field('value.title_pre', 'Título — antes', get('value.title_pre'))}
          ${field('value.title_em', 'Énfasis', get('value.title_em'))}
          ${field('value.title_post', 'Después', get('value.title_post'))}
        </div>
        ${field('value.desc', 'Descripción', get('value.desc'), 'textarea')}
      </div></div>
      <div class="field-group"><div class="field-group-header">Pilares (3 ítems)</div><div class="field-group-body">
        ${[0,1,2].map(i => `
          <div class="array-item"><div class="array-item-label">Pilar ${i+1}</div>
            ${field('value.pillars.'+i+'.t', 'Título', get('value.pillars.'+i+'.t'))}
            ${field('value.pillars.'+i+'.d', 'Descripción', get('value.pillars.'+i+'.d'), 'textarea')}
          </div>`).join('')}
      </div></div>`;
  }

  else if (section === 'services') {
    const items = content[lang]?.services?.items || [];
    html = `
      <div class="field-group"><div class="field-group-header">Encabezado</div><div class="field-group-body">
        ${field('services.eyebrow', 'Eyebrow', get('services.eyebrow'))}
        ${field('services.desc', 'Descripción', get('services.desc'), 'textarea')}
      </div></div>
      <div class="field-group"><div class="field-group-header">7 Servicios</div><div class="field-group-body">
        ${items.map((item, i) => `
          <div class="array-item"><div class="array-item-label">${item.num} — ${item.t}</div>
            ${field('services.items.'+i+'.t', 'Nombre del servicio', get('services.items.'+i+'.t'))}
            ${field('services.items.'+i+'.d', 'Descripción corta', get('services.items.'+i+'.d'), 'textarea')}
          </div>`).join('')}
      </div></div>`;
  }

  else if (section === 'advisor') {
    const items = content[lang]?.advisor?.items || [];
    html = `
      <div class="field-group"><div class="field-group-header">Encabezado</div><div class="field-group-body">
        ${field('advisor.eyebrow', 'Eyebrow', get('advisor.eyebrow'))}
        ${field('advisor.desc', 'Descripción', get('advisor.desc'), 'textarea')}
      </div></div>
      <div class="field-group"><div class="field-group-header">Servicios Advisor</div><div class="field-group-body">
        ${items.map((item, i) => `
          <div class="array-item"><div class="array-item-label">${item.num} — ${item.t}</div>
            ${field('advisor.items.'+i+'.t', 'Título', get('advisor.items.'+i+'.t'))}
            ${field('advisor.items.'+i+'.d', 'Descripción', get('advisor.items.'+i+'.d'), 'textarea')}
          </div>`).join('')}
      </div></div>`;
  }

  else if (section === 'method') {
    html = `
      <div class="field-group"><div class="field-group-header">Encabezado</div><div class="field-group-body">
        ${field('method.eyebrow', 'Eyebrow', get('method.eyebrow'))}
        ${field('method.desc', 'Descripción', get('method.desc'), 'textarea')}
      </div></div>
      <div class="field-group"><div class="field-group-header">5 Pasos</div><div class="field-group-body">
        ${[0,1,2,3,4].map(i => `
          <div class="array-item"><div class="array-item-label">Paso ${i+1}</div>
            <div class="field-row">
              ${field('method.steps.'+i+'.t', 'Nombre', get('method.steps.'+i+'.t'))}
              ${field('method.steps.'+i+'.m', 'Duración', get('method.steps.'+i+'.m'))}
            </div>
            ${field('method.steps.'+i+'.d', 'Descripción', get('method.steps.'+i+'.d'), 'textarea')}
          </div>`).join('')}
      </div></div>`;
  }

  else if (section === 'diff') {
    const items = content[lang]?.diff?.items || [];
    html = `
      <div class="field-group"><div class="field-group-header">Encabezado</div><div class="field-group-body">
        ${field('diff.eyebrow', 'Eyebrow', get('diff.eyebrow'))}
        <div class="field-row">
          ${field('diff.title_pre', 'Título — antes', get('diff.title_pre'))}
          ${field('diff.title_em', 'Énfasis', get('diff.title_em'))}
        </div>
      </div></div>
      <div class="field-group"><div class="field-group-header">Diferenciadores</div><div class="field-group-body">
        ${items.map((item, i) => `
          <div class="array-item"><div class="array-item-label">Diferenciador ${i+1}</div>
            ${field('diff.items.'+i+'.t', 'Título', get('diff.items.'+i+'.t'))}
            ${field('diff.items.'+i+'.d', 'Descripción', get('diff.items.'+i+'.d'), 'textarea')}
          </div>`).join('')}
      </div></div>`;
  }

  else if (section === 'about') {
    html = `
      <div class="field-group"><div class="field-group-header">Encabezado</div><div class="field-group-body">
        ${field('about.eyebrow', 'Eyebrow', get('about.eyebrow'))}
        <div class="field-row">
          ${field('about.title_pre', 'Título — antes', get('about.title_pre'))}
          ${field('about.title_em', 'Énfasis', get('about.title_em'))}
          ${field('about.title_post', 'Después', get('about.title_post'))}
        </div>
        ${field('about.intro', 'Introducción', get('about.intro'), 'textarea')}
      </div></div>
      <div class="field-group"><div class="field-group-header">Misión y Visión</div><div class="field-group-body">
        ${field('about.mv.0.v', 'Misión', get('about.mv.0.v'), 'textarea')}
        ${field('about.mv.1.v', 'Visión', get('about.mv.1.v'), 'textarea')}
      </div></div>`;
  }

  else if (section === 'plans') {
    const items = content[lang]?.plans?.items || [];
    html = `
      <div class="field-group"><div class="field-group-header">Encabezado</div><div class="field-group-body">
        ${field('plans.eyebrow', 'Eyebrow', get('plans.eyebrow'))}
        ${field('plans.desc', 'Descripción', get('plans.desc'), 'textarea')}
      </div></div>
      <div class="field-group"><div class="field-group-header">3 Planes</div><div class="field-group-body">
        ${items.map((item, i) => `
          <div class="array-item"><div class="array-item-label">${item.k}</div>
            <div class="field-row">
              ${field('plans.items.'+i+'.k', 'Nombre del plan', get('plans.items.'+i+'.k'))}
              ${field('plans.items.'+i+'.tag', 'Etiqueta', get('plans.items.'+i+'.tag'))}
            </div>
            ${field('plans.items.'+i+'.d', 'Descripción', get('plans.items.'+i+'.d'), 'textarea')}
            ${(item.features||[]).map((f, j) => field('plans.items.'+i+'.features.'+j, 'Característica '+(j+1), get('plans.items.'+i+'.features.'+j))).join('')}
          </div>`).join('')}
      </div></div>`;
  }

  else if (section === 'cta') {
    html = `
      <div class="field-group"><div class="field-group-header">Sección Contacto</div><div class="field-group-body">
        ${field('cta.eyebrow', 'Eyebrow', get('cta.eyebrow'))}
        <div class="field-row">
          ${field('cta.title_pre', 'Título — antes', get('cta.title_pre'))}
          ${field('cta.title_em', 'Énfasis', get('cta.title_em'))}
          ${field('cta.title_post', 'Después', get('cta.title_post'))}
        </div>
        ${field('cta.desc', 'Descripción', get('cta.desc'), 'textarea')}
        <div class="field-row">
          ${field('cta.btn', 'Botón primario', get('cta.btn'))}
          ${field('cta.btn2', 'Botón secundario', get('cta.btn2'))}
        </div>
      </div></div>
      <div class="field-group"><div class="field-group-header">Datos de contacto</div><div class="field-group-body">
        ${[0,1,2].map(i => `
          <div class="field-row">
            ${field('cta.meta.'+i+'.k', 'Etiqueta', get('cta.meta.'+i+'.k'))}
            ${field('cta.meta.'+i+'.v', 'Valor', get('cta.meta.'+i+'.v'))}
          </div>`).join('')}
      </div></div>`;
  }

  else if (section === 'foot') {
    html = `
      <div class="field-group"><div class="field-group-header">Footer</div><div class="field-group-body">
        ${field('foot.left', 'Texto izquierda', get('foot.left'))}
        ${field('foot.right', 'Texto derecha', get('foot.right'))}
      </div></div>`;
  }

  area.innerHTML = html;
}

// ---- Default content (fallback if API returns empty) ----
function getDefaultContent() {
  // Will be populated from window.CONTENT if available
  return typeof window.CONTENT !== 'undefined' ? window.CONTENT : { es: {}, en: {} };
}

// Check session on load
(async () => {
  const r = await fetch(API + 'auth.php?action=check');
  const d = await r.json();
  if (d.ok) { await loadContent(); showApp(); }
})();
</script>
</body>
</html>
